<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(255,107,53,0.5)}50%{text-shadow:0 0 40px rgba(255,107,53,0.8),0 0 60px rgba(255,215,0,0.3)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes pop{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes af{0%,100%{background:rgba(180,0,0,0.9)}50%{background:rgba(255,0,0,0.95)}}
@keyframes gli{0%{transform:translate(0)}25%{transform:translate(-4px,3px)}50%{transform:translate(4px,-3px)}75%{transform:translate(-2px,4px)}100%{transform:translate(0)}}
@keyframes burn{0%{opacity:1;filter:brightness(1)}30%{filter:brightness(2)}60%{filter:brightness(4) saturate(3)}80%{filter:brightness(2) hue-rotate(40deg)}100%{opacity:0;filter:brightness(0)}}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
</style>
</head>

function Mountain(props) {
  var progress = props.progress || 0;
  var pts = [[100,380],[120,360],[140,330],[160,300],[185,270],[210,245],[230,225],[255,205],[270,185],[285,165],[295,145],[305,125],[310,105],[315,88],[320,72]];
  var idx = Math.min(Math.floor(progress * (pts.length - 1)), pts.length - 1);
  var d = "";
  for (var i = 0; i <= idx; i++) d += (i===0?"M":"L")+pts[i][0]+","+pts[i][1]+" ";
  var cx = pts[idx][0], cy = pts[idx][1];
  var stars = [[140,30],[320,20],[450,50],[80,80],[400,100],[220,55],[50,45],[480,35]];
  var stubble = [];
  [-3,-1.5,0,1.5,3].forEach(function(dx,si){[7,8,9].forEach(function(dy,sj){stubble.push([dx,dy,si+"-"+sj]);});});

  return (
    <svg viewBox="0 0 500 420" style={{width:"100%",maxWidth:500,display:"block",margin:"0 auto"}}>
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#0a0e27"/><stop offset="40%" stopColor="#1a1a4e"/><stop offset="70%" stopColor="#2d1b69"/><stop offset="100%" stopColor="#e8683a"/></linearGradient>
        <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#8899aa"/><stop offset="40%" stopColor="#556677"/><stop offset="100%" stopColor="#334455"/></linearGradient>
        <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#667788"/><stop offset="100%" stopColor="#2a3a4a"/></linearGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="sg" cx="50%" cy="100%"><stop offset="0%" stopColor="#ffcc44" stopOpacity="0.6"/><stop offset="100%" stopColor="#ffcc44" stopOpacity="0"/></radialGradient>
      </defs>
      <rect width="500" height="420" fill="url(#sky)"/>
      {stars.map(function(s,i){return <circle key={i} cx={s[0]} cy={s[1]} r={1.2} fill="#fff" opacity="0.7"><animate attributeName="opacity" values="0.3;1;0.3" dur={(2+i*0.5)+"s"} repeatCount="indefinite"/></circle>;})}
      <ellipse cx="315" cy="72" rx="60" ry="40" fill="url(#sg)"/>
      <polygon points="0,420 50,200 120,280 180,160 250,250 340,100 400,200 470,150 500,220 500,420" fill="url(#mtn2)" opacity="0.5"/>
      <polygon points="0,420 80,300 150,340 200,250 250,200 280,170 310,110 315,72 320,110 350,160 380,190 420,230 460,280 500,320 500,420" fill="url(#mtn)"/>
      <polygon points="305,110 315,72 325,110 318,95 312,100" fill="#e8eef4" opacity="0.8"/>
      <polygon points="280,170 295,145 310,170 300,160" fill="#e8eef4" opacity="0.5"/>
      <line x1="315" y1="62" x2="315" y2="72" stroke="#ffd700" strokeWidth="2"/><line x1="310" y1="65" x2="320" y2="65" stroke="#ffd700" strokeWidth="2"/>
      <g transform="translate(175,275)"><polygon points="0,0 -8,8 8,8" fill="#cc8844"/><rect x="-6" y="8" width="12" height="7" fill="#aa6633"/><text x="14" y="10" fontSize="8" fill="#ddd" fontFamily="sans-serif">Hütte</text></g>
      {progress>0&&<path d={d} fill="none" stroke="#ff6b35" strokeWidth="2.5" strokeDasharray="6,4" filter="url(#gl)" opacity="0.9"/>}
      {progress>0&&(
        <g transform={"translate("+cx+","+(cy-34)+")"}>
          <animateTransform attributeName="transform" type="translate" values={cx+","+(cy-34)+";"+cx+","+(cy-36)+";"+cx+","+(cy-34)} dur="1.2s" repeatCount="indefinite"/>
          <ellipse cx="0" cy="16" rx="6" ry="8" fill="#2563eb"/><ellipse cx="0" cy="19" rx="5" ry="3.5" fill="#1d4ed8"/>
          <rect x="-5" y="23" width="4.5" height="10" rx="2" fill="#1e3a5f"/><rect x="0.5" y="23" width="4.5" height="10" rx="2" fill="#1e3a5f"/>
          <rect x="-6" y="32" width="5" height="3" rx="1" fill="#5c3d2e"/><rect x="1" y="32" width="5" height="3" rx="1" fill="#5c3d2e"/>
          <circle cx="0" cy="4" r="6" fill="#f0c8a0"/><ellipse cx="-1" cy="1" rx="3" ry="2" fill="#f5d5b5" opacity="0.5"/>
          <rect x="-5.5" y="1.5" width="4.5" height="4" rx="0.8" fill="none" stroke="#333" strokeWidth="1.2"/>
          <rect x="1" y="1.5" width="4.5" height="4" rx="0.8" fill="none" stroke="#333" strokeWidth="1.2"/>
          <line x1="-1" y1="3.5" x2="1" y2="3.5" stroke="#333" strokeWidth="1"/>
          <circle cx="-3.2" cy="3.8" r="1.2" fill="#3b82f6"/><circle cx="3.2" cy="3.8" r="1.2" fill="#3b82f6"/>
          <circle cx="-3.2" cy="3.5" r="0.4" fill="#111"/><circle cx="3.2" cy="3.5" r="0.4" fill="#111"/>
          <path d="M-2,7.2 Q0,8.8 2,7.2" fill="#d4826a" stroke="#c06050" strokeWidth="0.3"/>
          {stubble.map(function(s){return <circle key={s[2]} cx={s[0]} cy={s[1]} r="0.35" fill="#c4a050" opacity="0.45"/>;})}

          <line x1="-6" y1="12" x2="-8" y2="20" stroke="#f0c8a0" strokeWidth="2" strokeLinecap="round"/>

      {progress>=1&&(<g transform="translate(315,52)"><line x1="0" y1="0" x2="0" y2="-15" stroke="#ffd700" strokeWidth="1.5"/><polygon points="0,-15 12,-12 0,-9" fill="#ff4444"><animate attributeName="points" values="0,-15 12,-12 0,-9;0,-15 11,-11 0,-8;0,-15 12,-12 0,-9" dur="1s" repeatCount="indefinite"/></polygon></g>)}
    </svg>

function Confetti(){
  var cols=["#ff6b35","#ffd700","#ff4444","#44ff44","#4488ff","#ff44ff","#44ffff"];
  var pcs=[];for(var i=0;i<50;i++)pcs.push({id:i,x:Math.random()*100,del:Math.random()*2,dur:2+Math.random()*2,col:cols[i%cols.length],sz:4+Math.random()*8});
  return(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,pointerEvents:"none",zIndex:9999,overflow:"hidden"}}>{pcs.map(function(p){return<div key={p.id} style={{position:"absolute",left:p.x+"%",top:"-20px",width:p.sz,height:p.sz*0.6,backgroundColor:p.col,borderRadius:p.id%3===0?"50%":"2px",animation:"cfall "+p.dur+"s ease-in "+p.del+"s both"}}/>;})}</div>);
}

function Alarm(props){
  var attempts=props.attempts,onDone=props.onDone;
  var s=useState("flash");var phase=s[0],setPhase=s[1];
  useEffect(function(){
    if(attempts>=MAX_ATTEMPTS){setPhase("destruct");var t1=setTimeout(function(){setPhase("psych");},5500);return function(){clearTimeout(t1);};}
    var t2=setTimeout(onDone,2500);return function(){clearTimeout(t2);};
  },[attempts]);
  var ov={position:"fixed",top:0,left:0,right:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10000};
  var tx={fontFamily:"'Courier New',monospace",fontWeight:"bold",fontSize:22,color:"#fff",textAlign:"center"};
  if(attempts>=MAX_ATTEMPTS&&phase==="destruct")return(
    <div style={Object.assign({},ov,{background:"#000"})}><div style={{animation:"burn 5.5s ease-in forwards",textAlign:"center"}}>
      <div style={{fontSize:80,animation:"gli 0.1s infinite, shake 0.2s infinite",color:"#ff4400"}}>💥</div>
      <div style={Object.assign({},tx,{color:"#ff0000",animation:"gli 0.1s infinite",textShadow:"0 0 30px red",fontSize:26})}>GUTSCHEIN WIRD VERNICHTET...</div>
      <div style={Object.assign({},tx,{color:"#ff4400",fontSize:16,marginTop:16,animation:"gli 0.15s infinite"})}>ALLE DATEN WERDEN GELÖSCHT</div>
      <div style={Object.assign({},tx,{color:"#880000",fontSize:14,marginTop:8})}>Vernichtung läuft... bitte warten...</div>
    </div></div>);
  if(attempts>=MAX_ATTEMPTS&&phase==="psych")return(
    <div style={Object.assign({},ov,{background:"rgba(0,0,0,0.95)",cursor:"pointer"})} onClick={onDone}><div style={{textAlign:"center",animation:"fadeUp 0.5s ease-out"}}>
      <div style={{fontSize:50,marginBottom:16}}>😏</div>
      <div style={Object.assign({},tx,{color:"#ffd700",fontSize:24,lineHeight:1.6})}>Ach Jo, so leicht kommst du<br/>uns nicht davon...</div>
      <div style={Object.assign({},tx,{fontSize:18,color:"#ff6b35",marginTop:16})}>Spiel weiter!</div>
      <div style={Object.assign({},tx,{fontSize:13,color:"#666",marginTop:24})}>Antippen zum Fortfahren</div>
    </div></div>);
  return(<div style={ov}><div style={Object.assign({},ov,{animation:"af 0.3s infinite"})}><div style={{textAlign:"center"}}>
    <div style={{fontSize:60,color:"#fff"}}>🚨</div>
    <div style={Object.assign({},tx,{textShadow:"0 0 20px rgba(255,0,0,0.8)"})}>ZUGRIFF VERWEIGERT!</div>
    <div style={Object.assign({},tx,{fontSize:16,marginTop:8})}>{"Noch "+(MAX_ATTEMPTS-attempts)+" Versuch"+(MAX_ATTEMPTS-attempts!==1?"e":"")+" bis zur Selbstzerstörung!"}</div>
  </div></div></div>);
}

function PinPad(props){
  var onCorrect=props.onCorrect,note=props.note;
  var s1=useState("");var pin=s1[0],setPin=s1[1];
  var s2=useState(0);var att=s2[0],setAtt=s2[1];
  var s3=useState(false);var alarm=s3[0],setAlarm=s3[1];
  function tap(d){
    if(d==="del"){setPin(function(p){return p.slice(0,-1);});return;}
    var next=pin+d;if(next.length>4)return;setPin(next);
    if(next.length===4){if(next===PIN){setTimeout(onCorrect,300);}else{var na=att+1;setAtt(na);setAlarm(true);setPin("");}}
  }
  var digits=[1,2,3,4,5,6,7,8,9,"_",0,"del"];
  return(<div style={{textAlign:"center",marginTop:14}}>
    {alarm&&<Alarm attempts={att} onDone={function(){setAlarm(false);}}/>}
    <div style={{color:"#ffcc00",fontSize:12,marginBottom:6,fontStyle:"italic"}}>{note}</div>
    <div style={{color:"#aaa",fontSize:12,marginBottom:10}}>Jury: PIN eingeben</div>
    <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:12}}>
      {[0,1,2,3].map(function(i){return<div key={i} style={{width:36,height:44,borderRadius:8,border:"2px solid #555",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#fff",fontFamily:"monospace",background:pin.length>i?"rgba(255,107,53,0.3)":"rgba(255,255,255,0.05)"}}>{pin.length>i?"●":""}</div>;})}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,50px)",gap:6,justifyContent:"center"}}>
      {digits.map(function(d,i){var empty=d==="_";return<button key={i} onClick={function(){if(!empty)tap(d==="del"?"del":String(d));}} style={{width:50,height:44,fontSize:18,color:"#fff",cursor:empty?"default":"pointer",fontFamily:"inherit",borderRadius:8,background:empty?"transparent":"rgba(255,255,255,0.1)",border:empty?"none":"1px solid rgba(255,255,255,0.15)",visibility:empty?"hidden":"visible"}}>{d==="del"?"⌫":d==="_"?"":d}</button>;})}
    </div>
  </div>);
}

function ChallengeCard(props){
  var ch=props.ch,idx=props.idx,total=props.total,onDone=props.onDone;
  var s1=useState(ch.countdown?"setup":"reveal");var phase=s1[0],setPhase=s1[1];
  var s2=useState(3);var count=s2[0],setCount=s2[1];
  useEffect(function(){setPhase(ch.countdown?"setup":"reveal");setCount(3);},[idx]);
  useEffect(function(){if(phase==="countdown"){if(count>0){var t=setTimeout(function(){setCount(function(c){return c-1;});},1000);return function(){clearTimeout(t);};}setPhase("reveal");}},[phase,count]);
  var pbtn={padding:"12px 28px",fontSize:16,fontWeight:"bold",color:"#fff",cursor:"pointer",fontFamily:"inherit",borderRadius:12,border:"none",background:"linear-gradient(135deg,#ff6b35,#ff4444)",boxShadow:"0 4px 20px rgba(255,107,53,0.4)"};
  return(<div style={{padding:"0 16px"}}>
    <div style={{textAlign:"center",color:"#aaa",fontSize:12,marginBottom:6}}>{"Challenge "+(idx+1)+" von "+total}</div>
    <div style={{textAlign:"center",fontSize:28,marginBottom:4}}>{ch.icon}</div>
    <h2 style={{textAlign:"center",color:"#ff6b35",fontFamily:HF,fontSize:22,margin:"0 0 14px"}}>{ch.title}</h2>
    {phase==="setup"&&<div style={{textAlign:"center"}}><p style={{color:"#ddd",whiteSpace:"pre-line",lineHeight:1.6,fontSize:15}}>{ch.setup}</p><button onClick={function(){setPhase("countdown");}} style={Object.assign({},pbtn,{marginTop:16})}>Countdown starten!</button></div>}
    {phase==="countdown"&&<div style={{textAlign:"center"}}><div key={count} style={{fontSize:100,fontWeight:"bold",color:"#ff6b35",fontFamily:HF,textShadow:"0 0 40px rgba(255,107,53,0.5)",animation:"pop 0.8s ease-out"}}>{count===0?"LOS!":count}</div></div>}
    {phase==="reveal"&&<div><div style={{background:"rgba(255,107,53,0.1)",border:"1px solid rgba(255,107,53,0.3)",borderRadius:12,padding:16,marginBottom:12}}><p style={{color:"#fff",whiteSpace:"pre-line",lineHeight:1.7,fontSize:15,margin:0,textAlign:"center"}}>{ch.reveal}</p></div><PinPad onCorrect={onDone} note={ch.juryNote}/></div>}
  </div>);
}

function QuizCard(props){
  var q=props.q,idx=props.idx,total=props.total,onDone=props.onDone;
  var s1=useState(null);var sel=s1[0],setSel=s1[1];
  var s2=useState(false);var done=s2[0],setDone=s2[1];
  var s3=useState(0);var fails=s3[0],setFails=s3[1];
  var s4=useState("");var roast=s4[0],setRoast=s4[1];
  useEffect(function(){setSel(null);setDone(false);setFails(0);setRoast("");},[idx]);
  function pick(i){
    if(done)return;setSel(i);setDone(true);
    if(i===q.answer){setRoast("");setTimeout(onDone,1200);}
    else{var nf=fails+1;setFails(nf);setRoast(ROASTS[Math.min(nf-1,ROASTS.length-1)]);setTimeout(function(){setSel(null);setDone(false);},2200);}
  }
  return(<div style={{padding:"0 16px"}}>
    <div style={{textAlign:"center",color:"#aaa",fontSize:12,marginBottom:10}}>{"Frage "+(idx+1)+" von "+total}</div>
    <h3 style={{color:"#fff",textAlign:"center",fontSize:17,fontWeight:500,margin:"0 0 18px",lineHeight:1.5}}>{q.q}</h3>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {q.opts.map(function(opt,i){
        var bg="rgba(255,255,255,0.07)",bd="1px solid rgba(255,255,255,0.15)";
        if(done&&i===sel){if(i===q.answer){bg="rgba(34,197,94,0.3)";bd="1px solid #22c55e";}else{bg="rgba(239,68,68,0.3)";bd="1px solid #ef4444";}}
        return<button key={i} onClick={function(){pick(i);}} style={{padding:"12px 16px",fontSize:15,textAlign:"left",color:"#fff",cursor:"pointer",fontFamily:"inherit",borderRadius:10,background:bg,border:bd,display:"flex",alignItems:"center",gap:10}}>
          <span style={{color:"#ff6b35",fontWeight:"bold",fontSize:13,minWidth:20}}>{String.fromCharCode(65+i)}</span><span>{opt}</span></button>;
      })}
    </div>
    {roast&&<div style={{marginTop:14,padding:"10px 14px",background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,textAlign:"center"}}><p style={{color:"#ff6b6b",fontSize:15,margin:0,fontStyle:"italic",lineHeight:1.5}}>{roast}</p></div>}
  </div>);
}

    ["Route:","Ehrwald → Wiener Neustädter Hütte → Stopselzieher → Gipfel (2.962 m)"],

    ["Klettersteig:","A/B (leicht – du schaffst das!)"],
    ["Zeitraum:","Ende August – wir klären den Termin!"],
    ["Übernachtung:","Wiener Neustädter Hütte (2.213 m) – urig & gemütlich"],
    ["Abstieg:","Seilbahn zum Eibsee – mit Style 😎"],
  ];
  return(<div style={{padding:"0 12px",maxWidth:500,margin:"0 auto"}}>
    <div style={{background:"linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,215,0,0.1))",border:"1px solid rgba(255,107,53,0.3)",borderRadius:16,padding:20}}>
      <h2 style={{fontFamily:HF,color:"#ffd700",textAlign:"center",fontSize:28,margin:"0 0 4px"}}>🏔️ DEIN GUTSCHEIN</h2>
      <p style={{color:"#ff6b35",textAlign:"center",fontSize:14,margin:"0 0 16px"}}>Eine unvergessliche Bergtour auf Deutschlands höchsten Gipfel</p>
      <div style={{borderRadius:12,overflow:"hidden",marginBottom:16,border:"1px solid rgba(255,255,255,0.1)"}}>
        <img src="img/zugspitze.jpg" alt="Zugspitze Gipfelkreuz" style={{width:"100%",height:200,objectFit:"cover",display:"block"}} onError={function(e){e.target.style.display="none";}}/>
      </div>
      <div style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:16,marginBottom:12}}>
        <h3 style={{color:"#ff6b35",fontFamily:HF,fontSize:20,margin:"0 0 12px"}}>Zugspitze über den Stopselzieher</h3>
        {items.map(function(it,i){return<div key={i} style={{color:"#ccc",fontSize:14,lineHeight:2}}><strong style={{color:"#ffd700"}}>{it[0]}</strong> {it[1]}</div>;})}
      </div>
      <div style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:16,marginBottom:12}}>
        <h3 style={{color:"#ff6b35",fontFamily:HF,fontSize:16,margin:"0 0 8px"}}>📅 Tag 1: Aufstieg zur Hütte</h3>
        <p style={{color:"#bbb",fontSize:13,lineHeight:1.7,margin:0}}>Von der Talstation in Ehrwald durch das Gamskar zur Wiener Neustädter Hütte. Ca. 1.000 Hm, 2,5–3 Stunden. Gemütlich, mit Zeit für die Landschaft. Abends: Hüttenessen, Sonnenuntergang genießen, Vorfreude auf den Gipfeltag!</p>
      </div>
      <div style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:16,marginBottom:12}}>
        <h3 style={{color:"#ff6b35",fontFamily:HF,fontSize:16,margin:"0 0 8px"}}>⛰️ Tag 2: Gipfelsturm!</h3>
        <p style={{color:"#bbb",fontSize:13,lineHeight:1.7,margin:0}}>Vom Schneekar durch den legendären Stopselzieher-Klettersteig zum Gipfel. Ca. 750 Hm, 2,5–3 Stunden. Das namensgebende Felsloch ist das Highlight – spektakulär, aber gut gesichert. Oben angekommen: 360° Panorama vom höchsten Punkt Deutschlands! Abstieg bequem mit der Tiroler Zugspitzbahn.</p>
      </div>
      <div style={{textAlign:"center",padding:16,borderTop:"1px solid rgba(255,255,255,0.1)",marginTop:8}}>
        <p style={{color:"#ffd700",fontSize:16,fontFamily:HF,margin:"0 0 4px"}}>Geschenkt mit Liebe von</p>
        <p style={{color:"#ff6b35",fontSize:22,fontFamily:HF,margin:0}}>Marco & Manu ❤️</p>
        <p style={{color:"#666",fontSize:11,marginTop:12}}>Hüttenreservierung & Details folgen – freu dich drauf! 🎉</p>
      </div>
    </div>
  </div>);
}

function App(){
  var s1=useState("landing");var screen=s1[0],setScreen=s1[1];
  var s2=useState(null);var mode=s2[0],setMode=s2[1];
  var s3=useState(0);var step=s3[0],setStep=s3[1];
  var s4=useState(false);var confetti=s4[0],setConfetti=s4[1];
  var s5=useState(0);var sph=s5[0],setSph=s5[1];
  var total=mode==="party"?CHALLENGES.length:QUIZ.length;
  var progress=(screen==="summit"||screen==="details")?1:step/total;
  function stepDone(){if(step+1>=total){setScreen("summit");setConfetti(true);setSph(0);setTimeout(function(){setSph(1);},1500);setTimeout(function(){setSph(2);},3000);}else{setStep(function(s){return s+1;});}}
  function startMode(m){setMode(m);setStep(0);setScreen(m==="party"?"challenge":"quiz");}
  var pbtn={padding:"14px 32px",fontSize:17,fontWeight:"bold",color:"#fff",cursor:"pointer",fontFamily:"inherit",borderRadius:12,border:"none",background:"linear-gradient(135deg,#ff6b35,#ff4444)",boxShadow:"0 4px 20px rgba(255,107,53,0.4)",letterSpacing:1};
  return(<div style={{minHeight:"100vh",background:"#0a0e1a",color:"#fff",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
    {confetti&&<Confetti/>}
    <div style={{maxWidth:500,margin:"0 auto",padding:"0 0 40px"}}>
      {screen!=="landing"&&<div style={{animation:"fadeUp 0.8s ease-out"}}><Mountain progress={progress}/></div>}
      {screen==="landing"&&(<div style={{textAlign:"center",padding:"0 20px",animation:"fadeUp 1s ease-out"}}>
        <div style={{paddingTop:16}}><Mountain progress={0}/></div>
        <h1 style={{fontFamily:HF,fontSize:52,color:"#ff6b35",margin:"0",letterSpacing:4,animation:"glow 3s infinite"}}>JOHANNES</h1>
        <h2 style={{fontFamily:HF,fontSize:28,color:"#ffd700",margin:"0 0 8px",letterSpacing:6,opacity:0.9}}>GIPFELSTURM</h2>
        <p style={{color:"#8899aa",fontSize:14,margin:"0 0 28px",lineHeight:1.6}}>Dein Weg zum Gipfel beginnt hier.<br/>Aber zuerst musst du ihn dir verdienen...</p>
        <button onClick={function(){setScreen("mode");}} style={Object.assign({},pbtn,{animation:"breathe 2s infinite"})}>ABENTEUER STARTEN</button>
      </div>)}
      {screen==="mode"&&(<div style={{padding:"12px 16px",animation:"fadeUp 0.6s ease-out"}}>
        <h2 style={{fontFamily:HF,textAlign:"center",color:"#ffd700",fontSize:24,margin:"0 0 18px"}}>WÄHLE DEINEN WEG</h2>
        <button onClick={function(){startMode("party");}} style={{display:"block",width:"100%",padding:20,borderRadius:16,textAlign:"left",color:"#fff",cursor:"pointer",fontFamily:"inherit",marginBottom:12,border:"1px solid rgba(255,107,53,0.4)",background:"linear-gradient(135deg,rgba(255,107,53,0.2),rgba(255,68,68,0.1))"}}>
          <div style={{fontSize:28,marginBottom:4}}>🎉</div>
          <div style={{fontFamily:HF,fontSize:22,color:"#ff6b35",marginBottom:4}}>PARTY-MODUS</div>
          <div style={{color:"#aaa",fontSize:13,lineHeight:1.5}}>5 verrückte Challenges vor Publikum. Die Jury bestätigt per PIN.</div>
        </button>
        <button onClick={function(){startMode("solo");}} style={{display:"block",width:"100%",padding:20,borderRadius:16,textAlign:"left",color:"#fff",cursor:"pointer",fontFamily:"inherit",border:"1px solid rgba(68,136,255,0.3)",background:"linear-gradient(135deg,rgba(68,136,255,0.15),rgba(68,68,255,0.1))"}}>
          <div style={{fontSize:28,marginBottom:4}}>🧠</div>
          <div style={{fontFamily:HF,fontSize:22,color:"#4488ff",marginBottom:4}}>SOLO-MODUS</div>
          <div style={{color:"#aaa",fontSize:13,lineHeight:1.5}}>5 knifflige Quizfragen. Teste dein Wissen!</div>
        </button>
      </div>)}
      {screen==="challenge"&&(<div key={step} style={{animation:"fadeUp 0.5s ease-out"}}>
        <div style={{padding:"0 16px",marginBottom:10}}><div style={{height:4,background:"rgba(255,255,255,0.1)",borderRadius:2}}><div style={{height:"100%",borderRadius:2,transition:"width 0.5s",background:"linear-gradient(90deg,#ff6b35,#ffd700)",width:(step/total*100)+"%"}}/></div></div>
        <ChallengeCard ch={CHALLENGES[step]} idx={step} total={total} onDone={stepDone}/>
      </div>)}
      {screen==="quiz"&&(<div key={step} style={{animation:"fadeUp 0.5s ease-out"}}>
        <div style={{padding:"0 16px",marginBottom:10}}><div style={{height:4,background:"rgba(255,255,255,0.1)",borderRadius:2}}><div style={{height:"100%",borderRadius:2,transition:"width 0.5s",background:"linear-gradient(90deg,#4488ff,#44ffcc)",width:(step/total*100)+"%"}}/></div></div>
        <QuizCard q={QUIZ[step]} idx={step} total={total} onDone={stepDone}/>
      </div>)}
      {screen==="summit"&&(<div style={{textAlign:"center",padding:"0 20px",animation:"fadeUp 0.8s ease-out"}}>
        {sph>=0&&<h1 style={{fontFamily:HF,fontSize:34,color:"#ffd700",margin:"0 0 8px",animation:"glow 2s infinite"}}>🏔️ GIPFEL ERREICHT!</h1>}
        {sph>=1&&<p style={{color:"#ff6b35",fontSize:18,margin:"0 0 8px",animation:"fadeUp 0.5s ease-out"}}>Johannes, du hast es geschafft!</p>}
        {sph>=2&&<div style={{animation:"fadeUp 0.8s ease-out"}}><p style={{color:"#aaa",fontSize:14,margin:"0 0 20px"}}>Und jetzt kommt deine wahre Belohnung...</p><button onClick={function(){setScreen("details");setConfetti(false);}} style={pbtn}>GUTSCHEIN ENTHÜLLEN 🎁</button></div>}
      </div>)}
      {screen==="details"&&<div style={{animation:"fadeUp 0.8s ease-out"}}><TourDetails/></div>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
